<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GRIND + FUEL</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a32;
  --w-accent:#e8ff47;--m-accent:#7fff5f;
  --accent2:#ffca3a;--red:#ff6b6b;--blue:#47c8ff;--green:#2ed573;
  --text:#f0f0f5;--muted:#6b6b7e;
  --p-color:#7fff5f;--c-color:#ffca3a;--f-color:#ff9f43;
  --warm:#1a2a3a;--finish:#0f2a1a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
.install-banner{background:linear-gradient(135deg,#1a2a1a,#0f2a0f);border-bottom:1px solid var(--m-accent);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.install-text{font-size:11px;color:var(--m-accent);flex:1;line-height:1.4;}
.install-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;white-space:nowrap;transition:color 0.2s;}
.app-title.workout{color:var(--w-accent);}
.app-title.meal{color:var(--m-accent);}
.topbar-center{flex:1;display:flex;gap:5px;justify-content:center;}
.macro-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 8px;text-align:center;}
.macro-pill .val{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;line-height:1;}
.macro-pill .lbl{font-size:8px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;}
.macro-pill.p .val{color:var(--p-color);}
.macro-pill.c .val{color:var(--c-color);}
.macro-pill.f .val{color:var(--f-color);}
.week-nav{display:flex;align-items:center;gap:6px;}
.week-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:7px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.week-info{text-align:center;}
.week-num{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;line-height:1;}
.week-num.workout{color:var(--w-accent);}
.week-num.meal{color:var(--m-accent);}
.week-dates{font-size:9px;color:var(--muted);}
.topbar-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:5px 9px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.topbar-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.day-tabs{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);scrollbar-width:none;flex-shrink:0;}
.day-tabs::-webkit-scrollbar{display:none;}
.dtab{flex:0 0 auto;padding:8px 14px;font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;text-align:center;}
.dtab.active.workout{color:var(--w-accent);border-bottom-color:var(--w-accent);}
.dtab.rest{opacity:0.4;cursor:default;}
.dtab-sub{font-size:8px;color:var(--muted);display:block;margin-top:1px;}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.main{padding:14px;max-width:700px;margin:0 auto;}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;cursor:pointer;border:none;background:none;color:var(--muted);transition:color 0.15s;gap:3px;}
.nav-icon{font-size:22px;line-height:1;}
.nav-label{font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.nav-btn.active.workout{color:var(--w-accent);}
.nav-btn.active.meal{color:var(--m-accent);}

/* WORKOUT */
.exercise-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.exercise-card.warmup{border-left:3px solid var(--blue);background:var(--warm);}
.exercise-card.finisher{border-left:3px solid var(--green);background:var(--finish);}
.card-header{display:flex;align-items:center;padding:11px 13px;gap:9px;cursor:pointer;user-select:none;}
.ex-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.badge-warmup{background:rgba(71,200,255,0.15);color:var(--blue);}
.badge-finish{background:rgba(46,213,115,0.15);color:var(--green);}
.badge-lift{background:rgba(232,255,71,0.1);color:var(--w-accent);}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-target{font-size:10px;color:var(--muted);margin-top:1px;}
.card-actions{display:flex;gap:7px;align-items:center;}
.watch-btn{background:rgba(255,71,87,0.12);color:#ff6b7a;border:none;padding:4px 9px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:3px;white-space:nowrap;}
.swap-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:5px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.chevron{font-size:10px;color:var(--muted);transition:transform 0.2s;margin-left:3px;flex-shrink:0;}
.chevron.open{transform:rotate(90deg);}
.set-logger{display:none;padding:0 13px 13px;}
.set-logger.open{display:block;}
.sets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;margin-bottom:7px;}
.set-block{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 9px;}
.set-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:5px;}
.set-inputs{display:flex;gap:5px;}
.set-input-wrap{flex:1;}
.set-input-label{font-size:8px;color:var(--muted);margin-bottom:2px;}
.set-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:5px 6px;text-align:center;transition:border-color 0.15s;}
.set-input:focus{outline:none;border-color:var(--w-accent);}
.set-input.filled{border-color:var(--green);color:var(--green);}
.cardio-log{background:var(--surface2);border-radius:7px;padding:9px 11px;display:flex;gap:9px;align-items:center;}
.cardio-label{font-size:10px;color:var(--muted);flex-shrink:0;}
.cardio-input{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 9px;width:170px;}
.cardio-input:focus{outline:none;border-color:var(--blue);}
.day-footer{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px;margin-top:8px;display:flex;gap:9px;flex-wrap:wrap;}
.footer-field{flex:1;min-width:110px;}
.footer-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:3px;}
.footer-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 9px;}
.footer-input:focus{outline:none;border-color:var(--w-accent);}
.save-bar{padding:10px 14px 14px;max-width:700px;margin:0 auto;display:flex;gap:9px;}
.save-btn{flex:1;background:var(--w-accent);color:var(--bg);border:none;border-radius:9px;padding:13px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;}
.clear-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:13px 16px;font-size:12px;cursor:pointer;}

/* MEAL */
.week-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(127,255,95,0.12),rgba(127,255,95,0.05));border:1px solid rgba(127,255,95,0.3);border-radius:20px;padding:5px 12px;margin-bottom:14px;}
.week-badge-label{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;color:var(--m-accent);}
.week-badge-sub{font-size:10px;color:var(--muted);}
.budget-banner{background:linear-gradient(135deg,rgba(46,213,115,0.08),rgba(46,213,115,0.03));border:1px solid rgba(46,213,115,0.2);border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.budget-icon{font-size:24px;flex-shrink:0;}
.budget-info{flex:1;}
.budget-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--green);}
.budget-sub{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.5;}
.budget-day{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);letter-spacing:1px;flex-shrink:0;text-align:right;}
.budget-day span{font-size:9px;font-family:'DM Sans',sans-serif;color:var(--muted);display:block;}
.day-summary{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:14px;}
.summary-title{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;color:var(--muted);margin-bottom:9px;}
.macro-row{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
.macro-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;width:52px;flex-shrink:0;}
.macro-name.p{color:var(--p-color);}
.macro-name.c{color:var(--c-color);}
.macro-name.f{color:var(--f-color);}
.macro-track{flex:1;background:var(--surface2);border-radius:4px;height:5px;overflow:hidden;}
.macro-fill{height:100%;border-radius:4px;transition:width 0.5s;}
.macro-fill.p{background:var(--p-color);}
.macro-fill.c{background:var(--c-color);}
.macro-fill.f{background:var(--f-color);}
.macro-nums{font-size:10px;color:var(--muted);white-space:nowrap;width:78px;text-align:right;flex-shrink:0;}
.cal-row{display:flex;justify-content:space-between;align-items:center;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.cal-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.cal-value{font-family:'Bebas Neue',sans-serif;font-size:17px;}

/* FIXED meals (snacks, shake, breakfast) */
.fixed-label{display:inline-block;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;margin-left:6px;vertical-align:middle;}

.meal-card{background:#141a14;border:1px solid var(--border);border-radius:12px;margin-bottom:11px;overflow:hidden;}
.meal-card.shake-card{border-color:rgba(127,255,95,0.25);}
.meal-card.rotating{border-color:rgba(232,255,71,0.2);}
.meal-header{display:flex;align-items:center;padding:11px 13px;gap:9px;cursor:pointer;user-select:none;}
.meal-icon-box{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.meal-info{flex:1;min-width:0;}
.meal-name-row{display:flex;align-items:center;}
.meal-name{font-size:13px;font-weight:600;}
.meal-time{font-size:10px;color:var(--muted);margin-top:1px;}
.meal-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.meal-cals{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--accent2);letter-spacing:0.5px;}
.meal-cost{font-size:10px;color:var(--green);font-weight:600;}
.meal-body{display:none;padding:0 13px 13px;}
.meal-body.open{display:block;}
.food-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);}
.food-row:last-child{border-bottom:none;}
.food-left{flex:1;}
.food-name{font-size:12px;}
.food-detail{font-size:10px;color:var(--muted);margin-top:1px;}
.food-right{text-align:right;flex-shrink:0;margin-left:10px;}
.food-macros{font-size:10px;color:var(--muted);}
.food-cal{font-size:11px;color:var(--accent2);font-weight:600;}
.meal-note{background:var(--surface2);border-radius:7px;padding:7px 9px;margin-top:9px;font-size:11px;color:var(--muted);line-height:1.5;border-left:2px solid var(--m-accent);}
.meal-note.shake{border-left-color:var(--p-color);}
.meal-note.rotate{border-left-color:var(--w-accent);}

/* PREP & SHOP */
.prep-box{background:var(--surface);border:1px solid rgba(46,213,115,0.2);border-radius:12px;padding:13px 14px;margin-top:4px;}
.prep-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:var(--green);margin-bottom:8px;}
.prep-step{font-size:12px;color:var(--muted);line-height:1.9;padding-left:4px;}
.prep-step strong{color:var(--text);}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:18px 15px 34px;width:100%;max-width:520px;max-height:84vh;overflow-y:auto;animation:slideUp 0.25s ease;position:relative;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:3px;}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:14px;}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;margin-bottom:11px;}
.modal-input:focus{outline:none;border-color:var(--w-accent);}
.swap-option{padding:10px 12px;border-radius:7px;border:1px solid var(--border);margin-bottom:5px;cursor:pointer;transition:all 0.15s;}
.swap-option:hover{border-color:var(--w-accent);}
.swap-option-name{font-size:13px;font-weight:600;}
.swap-option-muscle{font-size:10px;color:var(--muted);margin-top:1px;}
.custom-swap-btn{width:100%;background:var(--w-accent);color:var(--bg);border:none;border-radius:7px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;margin-top:7px;}
.export-content{background:var(--surface2);border-radius:9px;padding:12px;margin:11px 0;font-size:10px;line-height:1.7;color:var(--text);white-space:pre-wrap;font-family:'Courier New',monospace;max-height:260px;overflow-y:auto;border:1px solid var(--border);}
.export-actions{display:flex;gap:9px;margin-top:11px;}
.copy-btn{flex:1;background:var(--w-accent);color:var(--bg);border:none;border-radius:7px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;}
.dl-btn{flex:1;background:var(--surface2);border:1px solid var(--blue);color:var(--blue);border-radius:7px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;}
.shop-total-banner{background:linear-gradient(135deg,rgba(46,213,115,0.1),rgba(46,213,115,0.04));border:1px solid rgba(46,213,115,0.3);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.shop-total-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--green);letter-spacing:1px;}
.shop-section{margin-bottom:14px;}
.shop-cat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.shop-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.shop-item:last-child{border-bottom:none;}
.shop-cb{width:16px;height:16px;border:1px solid var(--border);border-radius:3px;background:var(--surface2);cursor:pointer;flex-shrink:0;margin-top:2px;transition:all 0.15s;}
.shop-cb.checked{background:var(--m-accent);border-color:var(--m-accent);}
.shop-text{flex:1;}
.shop-name{font-size:12px;}
.shop-qty{font-size:10px;color:var(--muted);margin-top:1px;}
.shop-price{font-size:12px;font-weight:600;color:var(--accent2);white-space:nowrap;flex-shrink:0;}
.week-pills{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.week-pill{flex:1;min-width:60px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 6px;text-align:center;cursor:pointer;transition:all 0.15s;}
.week-pill.active{background:rgba(127,255,95,0.1);border-color:var(--m-accent);}
.week-pill-num{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--m-accent);letter-spacing:1px;}
.week-pill-sub{font-size:9px;color:var(--muted);margin-top:1px;}
.rest-screen{text-align:center;padding:50px 20px;}
.rest-icon{font-size:55px;margin-bottom:14px;}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--muted);}
.rest-sub{color:var(--muted);font-size:13px;margin-top:7px;}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:var(--bg);padding:9px 18px;border-radius:18px;font-weight:700;font-size:12px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:300;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="install-banner" id="ib">
  <div class="install-text"><strong>📱 Save to phone:</strong> iPhone → Safari → Share → "Add to Home Screen" | Android → Chrome → ⋮ → "Add to Home Screen"</div>
  <button class="install-close" onclick="document.getElementById('ib').style.display='none'">✕</button>
</div>

<div class="topbar">
  <div class="app-title workout" id="appTitle">GRIND</div>
  <div class="topbar-center" id="topbarCenter"></div>
  <button class="topbar-btn" id="topbarBtn"></button>
</div>

<div class="day-tabs" id="dayTabs"></div>

<div class="scroll-area" id="scrollArea">
  <div id="content"></div>
  <div id="saveBarContainer"></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active workout" id="navWorkout" onclick="switchView('workout')">
    <div class="nav-icon">🏋️</div><div class="nav-label">Workout</div>
  </button>
  <button class="nav-btn" id="navMeal" onclick="switchView('meal')">
    <div class="nav-icon">🥗</div><div class="nav-label">Meals</div>
  </button>
</div>

<!-- SWAP MODAL -->
<div class="modal-overlay" id="swapOverlay" onclick="closeSwap(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeSwap()">✕</button>
    <div class="modal-title" style="color:var(--w-accent)">SWAP EXERCISE</div>
    <div class="modal-sub">Replacing: <span id="replacingName"></span></div>
    <input class="modal-input" id="customExName" placeholder="Type custom exercise name..."/>
    <div id="swapOptions"></div>
    <button class="custom-swap-btn" onclick="applyCustomSwap()">Use Custom Exercise</button>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="exportOverlay" onclick="closeExport(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeExport()">✕</button>
    <div class="modal-title" style="color:var(--w-accent)">WEEK <span id="exportWeekNum"></span> SUMMARY</div>
    <div class="modal-sub" id="exportWeekDates"></div>
    <div class="export-content" id="exportContent"></div>
    <div class="export-actions">
      <button class="copy-btn" onclick="copyExport()">📋 Copy</button>
      <button class="dl-btn" onclick="downloadExport()">⬇ Download</button>
    </div>
  </div>
</div>

<!-- SHOPPING MODAL -->
<div class="modal-overlay" id="shopOverlay" onclick="closeShop(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeShop()">✕</button>
    <div class="modal-title" style="color:var(--m-accent)">WEEK <span id="shopWeekLabel"></span> SHOPPING LIST</div>
    <div class="modal-sub" id="shopWeekSub"></div>
    <div class="week-pills" id="shopWeekPills"></div>
    <div class="shop-total-banner">

      h+=`</div>`;
    } else {h+=`<div class="cardio-log"><span class="cardio-label">Note / Time:</span><input class="cardio-input" type="text" value="${ed.cardioNote||''}" placeholder="e.g. 25 min, 2.1 mi" onchange="updCardio(${ei},this.value)"></div>`;}
    h+=`</div></div>`;

function getMealWeek(){return((mWeek-1)%4)+1;}
function getMealPlan(){return WEEKLY_MEALS[getMealWeek()];}
function getMeals(){const w=getMealPlan();return[FIXED_BREAKFAST,FIXED_SNACK1,w.lunch,FIXED_SHAKE,w.dinner];}
function mTotals(){let cal=0,p=0,c=0,f=0,cost=0;getMeals().forEach(m=>m.foods.forEach(fd=>{cal+=fd.cal;p+=fd.p;c+=fd.c;f+=fd.f;cost+=fd.cost;}));return{cal,p,c,f,cost};}
function pct(v,t){return Math.min(100,Math.round(v/t*100));}

function renderMealDay(){
  document.getElementById('saveBarContainer').innerHTML='';
  const meals=getMeals(),tot=mTotals(),wp=getMealPlan();
  let h=`<div class="main">
    <div class="week-badge"><div class="week-badge-label">📅 ${wp.theme}</div><div class="week-badge-sub">${['W1','W2','W3','W4'][(getMealWeek()-1)]} of 4-week rotation</div></div>
    <div class="budget-banner"><div class="budget-icon">💰</div><div class="budget-info"><div class="budget-title">BUDGET PLAN — SAME DAILY</div><div class="budget-sub">Same meals every day · New lunch & dinner each week<br>Breakfast · Snack · Shake stay the same all 4 weeks</div></div><div class="budget-day">~$${tot.cost.toFixed(2)}<span>per day</span></div></div>
    <div class="day-summary"><div class="summary-title">📊 DAILY MACROS — EVERY DAY THIS WEEK</div>
      <div class="macro-row"><span class="macro-name p">Protein</span><div class="macro-track"><div class="macro-fill p" style="width:${pct(tot.p,MT.p)}%"></div></div><span class="macro-nums">${tot.p}g / ${MT.p}g</span></div>
      <div class="macro-row"><span class="macro-name c">Carbs</span><div class="macro-track"><div class="macro-fill c" style="width:${pct(tot.c,MT.c)}%"></div></div><span class="macro-nums">${tot.c}g / ${MT.c}g</span></div>
      <div class="macro-row"><span class="macro-name f">Fat</span><div class="macro-track"><div class="macro-fill f" style="width:${pct(tot.f,MT.f)}%"></div></div><span class="macro-nums">${tot.f}g / ${MT.f}g</span></div>
      <div class="cal-row"><span class="cal-label">Daily Calories</span><span class="cal-value">${tot.cal} <span style="font-size:11px;color:var(--muted)">/ ${MT.cal} kcal</span></span></div>
    </div>`;

  meals.forEach((meal,mi)=>{
    const mcal=meal.foods.reduce((s,f)=>s+f.cal,0);
    const mcost=meal.foods.reduce((s,f)=>s+f.cost,0);
    const mp=meal.foods.reduce((s,f)=>s+f.p,0);
    const mc=meal.foods.reduce((s,f)=>s+f.c,0);
    const mfa=meal.foods.reduce((s,f)=>s+f.f,0);
    const isOpen=mOpen[`${mWeek}_${mi}`]||false;
    const isRotating=!meal.fixed&&!meal.shake;
    h+=`<div class="meal-card ${meal.shake?'shake-card':isRotating?'rotating':''}">
      <div class="meal-header" onclick="togM(${mi})">
        <div class="meal-icon-box" style="background:${meal.bg}">${meal.icon}</div>
        <div class="meal-info">
          <div class="meal-name-row"><span class="meal-name">${meal.name}</span>${meal.fixed?`<span class="fixed-label">every week</span>`:`<span class="fixed-label" style="color:var(--w-accent);border-color:rgba(232,255,71,0.3)">week ${getMealWeek()}</span>`}</div>
          <div class="meal-time">${meal.time} · ${mp}p · ${mc}c · ${mfa}f</div>
        </div>
        <div class="meal-right"><div class="meal-cals">${mcal} cal</div><div class="meal-cost">~$${mcost.toFixed(2)}</div></div>
        <span class="chevron ${isOpen?'open':''}">▶</span>
      </div>
      <div class="meal-body ${isOpen?'open':''}" id="mb_${mi}">`;
    meal.foods.forEach(fd=>{h+=`<div class="food-row"><div class="food-left"><div class="food-name">${fd.name}</div><div class="food-detail">${fd.amount} · ~$${fd.cost.toFixed(2)}/serving</div></div><div class="food-right"><div class="food-macros">${fd.p}p · ${fd.c}c · ${fd.f}f</div><div class="food-cal">${fd.cal} cal</div></div></div>`;});
    if(meal.note)h+=`<div class="meal-note ${meal.shake?'shake':isRotating?'rotate':''}">${meal.note}</div>`;
    h+=`</div></div>`;
  });

  // Prep guide
  h+=`<div class="prep-box"><div class="prep-title">🍳 SUNDAY PREP — ${getMealWeek()===3?'60':'90'} MINUTES</div><div class="prep-step">`;
  wp.prep.forEach((step,i)=>{h+=`${i+1}. ${step.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}<br>`;});
  h+=`</div></div></div>`;
  return h;
}

function togM(mi){const k=`${mWeek}_${mi}`;mOpen[k]=!mOpen[k];const b=document.getElementById(`mb_${mi}`);b.classList.toggle('open',mOpen[k]);b.previousElementSibling.querySelector('.chevron').classList.toggle('open',mOpen[k]);}

let shopViewWeek=1;
function openShop(){
  shopViewWeek=getMealWeek();
  renderShopModal();
  document.getElementById('shopOverlay').classList.add('open');
}
function renderShopModal(){
  const w=((shopViewWeek-1)%4)+1,wp=WEEKLY_MEALS[w];
  document.getElementById('shopWeekLabel').textContent=shopViewWeek;
  document.getElementById('shopWeekSub').textContent=`${wp.theme} shopping list · ${getWeekDates(shopViewWeek)}`;
  document.getElementById('shopTotalVal').textContent=`~${wp.total}`;
  document.getElementById('shopWeekPills').innerHTML=[1,2,3,4].map(n=>`<div class="week-pill ${shopViewWeek===n?'active':''}" onclick="switchShopWeek(${n})"><div class="week-pill-num">W${n}</div><div class="week-pill-sub">${WEEKLY_MEALS[n].theme.replace('Week ','Wk ')}</div></div>`).join('');
  document.getElementById('shopList').innerHTML=wp.shop.map(s=>`<div class="shop-section"><div class="shop-cat">${s.cat}</div>`+s.items.map((item,i)=>{const k=`w${w}_${s.cat}_${i}`,ck=shopCk[k]||false;return`<div class="shop-item"><div class="shop-cb ${ck?'checked':''}" onclick="togShop('w${w}_${s.cat}_${i}',this)"></div><div class="shop-text"><div class="shop-name" style="${ck?'text-decoration:line-through;color:var(--muted)':''}">${item.name}</div><div class="shop-qty">${item.qty} · ${item.note}</div></div><div class="shop-price">${item.total}</div></div>`;}).join('')+`</div>`).join('');
}
function switchShopWeek(n){shopViewWeek=n;renderShopModal();}
function closeShop(e){if(!e||e.target===document.getElementById('shopOverlay'))document.getElementById('shopOverlay').classList.remove('open');}
function togShop(k,el){shopCk[k]=!shopCk[k];el.classList.toggle('checked',shopCk[k]);el.nextElementSibling.querySelector('.shop-name').style=shopCk[k]?'text-decoration:line-through;color:var(--muted)':'';persist();}

function renderTopbar(){

  if(currentView==='workout'){
    title.textContent='GRIND';title.className='app-title workout';
    center.innerHTML=`<div class="week-nav"><button onclick="changeWeek(-1)">‹</button><div class="week-info"><div class="week-num workout">WEEK ${currentWeek}</div><div class="week-dates">${getWeekDates(currentWeek)}</div></div><button onclick="changeWeek(1)">›</button></div>`;
    btn.textContent='📋 Export';btn.onclick=openExport;
  } else {
    title.textContent='FUEL';title.className='app-title meal';
    center.innerHTML=`<div class="week-nav"><button onclick="changeMealWeek(-1)">‹</button><div class="week-info"><div class="week-num meal">WEEK ${mWeek}</div><div class="week-dates">${getMealPlan().theme}</div></div><button onclick="changeMealWeek(1)">›</button></div>`;

function changeMealWeek(d){const n=mWeek+d;if(n<1)return;mWeek=n;renderTopbar();renderContent();}

function renderTabs(){
  if(currentView==='workout'){
    document.getElementById('dayTabs').innerHTML=W_DAYS_DATA.map((d,i)=>`<div class="dtab ${d.rest?'rest':''} ${i===wDay?'active workout':''}" onclick="${d.rest?'':` setWDay(${i})`}">${d.label}<span class="dtab-sub">${d.rest?'rest':d.title.split(' ')[0]}</span></div>`).join('');
  } else {
    const days=['MON','TUE','WED','THU','FRI','SAT','SUN'],labels=['Upper','Lower','Rest','Push','Pull','Legs','Rest'];
    document.getElementById('dayTabs').innerHTML=days.map((d,i)=>`<div class="dtab" style="color:${i===2||i===6?'var(--muted)':'var(--m-accent)'};border-bottom:2px solid ${i===2||i===6?'transparent':'var(--m-accent)'};opacity:${i===2||i===6?'0.4':'1'}">${d}<span class="dtab-sub">${labels[i]}</span></div>`).join('');
  }
}
function setWDay(i){wDay=i;renderTabs();renderContent();}
function renderContent(){document.getElementById('scrollArea').scrollTop=0;document.getElementById('content').innerHTML=currentView==='workout'?renderWorkoutDay():renderMealDay();}

function persist(){
  try{

    localStorage.setItem('gf3_sh',JSON.stringify(shopCk));
  }catch(e){}
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async()=>{
    try{
      await setDoc(doc(db,'users',USER_ID),{
        workoutData: JSON.stringify(workoutData),
        customEx: JSON.stringify(customEx),
        shopCk: JSON.stringify(shopCk),
        updatedAt: new Date().toISOString()

async function init(){
  const map={1:0,2:1,3:2,4:3,5:4,6:5,0:6};
  wDay=map[new Date().getDay()]??0;

  document.getElementById('content').innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:30px;margin-bottom:12px">☁️</div><div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px">LOADING YOUR DATA...</div></div>`;
  renderTopbar();renderTabs();
  try{
    const snap = await getDoc(doc(db,'users',USER_ID));
    if(snap.exists()){
      const d=snap.data();
      if(d.workoutData)workoutData=JSON.parse(d.workoutData);
      if(d.customEx)customEx=JSON.parse(d.customEx);
      if(d.shopCk)shopCk=JSON.parse(d.shopCk);
      showToast('☁️ Data loaded!');
    } else {
      try{const a=localStorage.getItem('gf3_w');if(a)workoutData=JSON.parse(a);const b=localStorage.getItem('gf3_cx');if(b)customEx=JSON.parse(b);const c=localStorage.getItem('gf3_sh');if(c)shopCk=JSON.parse(c);}catch(e){}
    }
  }catch(e){
    try{const a=localStorage.getItem('gf3_w');if(a)workoutData=JSON.parse(a);const b=localStorage.getItem('gf3_cx');if(b)customEx=JSON.parse(b);const c=localStorage.getItem('gf3_sh');if(c)shopCk=JSON.parse(c);}catch(e2){}
  }
  renderContent();
}
